<svg width="1000" height="360" viewBox="0 0 1000 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#121022"/>
      <stop offset="0.48" stop-color="#271138"/>
      <stop offset="1" stop-color="#0b1830"/>
    </linearGradient>
    <linearGradient id="panel" x1="204" y1="68" x2="810" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#21152f" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#0d1426" stop-opacity="0.94"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .float-a { animation: floatA 5s ease-in-out infinite; }
      .float-b { animation: floatB 6.5s ease-in-out infinite; }
      .blink { animation: blink 1.2s steps(2, end) infinite; }
      .scan { animation: scan 4s linear infinite; }
      .petal { animation: drift 8s linear infinite; transform-origin: center; }
      @keyframes floatA { 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-12px);} }
      @keyframes floatB { 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(10px);} }
      @keyframes blink { 0%,45%{ opacity:1;} 46%,100%{ opacity:0;} }
      @keyframes scan { 0%{ transform: translateX(-420px);} 100%{ transform: translateX(420px);} }
      @keyframes drift { 0%{ transform: translateY(-30px) rotate(0deg); opacity:0;} 15%{ opacity:1;} 100%{ transform: translateY(420px) rotate(260deg); opacity:0;} }
    </style>
  </defs>

  <rect width="1000" height="360" rx="28" fill="url(#bg)"/>
  <circle cx="835" cy="76" r="46" fill="#ffd9f3" opacity="0.16" filter="url(#glow)"/>
  <circle cx="138" cy="278" r="88" fill="#ff69b4" opacity="0.09" filter="url(#glow)"/>
  <circle cx="902" cy="277" r="76" fill="#65dbff" opacity="0.09" filter="url(#glow)"/>

  <g class="petal" style="animation-delay:0s"><ellipse cx="120" cy="20" rx="5" ry="11" fill="#ff9bd0" opacity="0.7"/></g>
  <g class="petal" style="animation-delay:1.1s"><ellipse cx="300" cy="-40" rx="4" ry="10" fill="#ffd1ea" opacity="0.75"/></g>
  <g class="petal" style="animation-delay:2.2s"><ellipse cx="520" cy="-20" rx="5" ry="12" fill="#ff77bd" opacity="0.65"/></g>
  <g class="petal" style="animation-delay:3.1s"><ellipse cx="760" cy="-60" rx="4" ry="10" fill="#ffc1e2" opacity="0.7"/></g>
  <g class="petal" style="animation-delay:4.2s"><ellipse cx="910" cy="-30" rx="6" ry="13" fill="#ff8cc7" opacity="0.65"/></g>

  <g class="float-a">
    <path d="M154 113L166 137L193 141L173 160L178 187L154 174L130 187L135 160L115 141L142 137L154 113Z" fill="#ff69b4" opacity="0.72" filter="url(#glow)"/>
  </g>
  <g class="float-b">
    <path d="M858 156L867 173L886 176L872 190L875 209L858 200L841 209L844 190L830 176L849 173L858 156Z" fill="#65dbff" opacity="0.72" filter="url(#glow)"/>
  </g>

  <rect x="206" y="66" width="588" height="236" rx="18" fill="url(#panel)" stroke="#ff69b4" stroke-opacity="0.65"/>
  <rect x="224" y="84" width="552" height="34" rx="10" fill="#0d1020"/>
  <circle cx="247" cy="101" r="5" fill="#ff5f9e"/>
  <circle cx="267" cy="101" r="5" fill="#ffd166"/>
  <circle cx="287" cy="101" r="5" fill="#65dbff"/>

  <text x="244" y="158" fill="#ff9bd0" font-family="JetBrains Mono, Consolas, monospace" font-size="20" font-weight="700">TAIYAKICHAN.EXE</text>
  <text x="244" y="194" fill="#ffffff" font-family="JetBrains Mono, Consolas, monospace" font-size="30" font-weight="700">anime-coded desktop tools</text>
  <text x="244" y="232" fill="#9eeaff" font-family="JetBrains Mono, Consolas, monospace" font-size="18">status: building Chiz Fishing Tools for NTE</text>
  <text x="244" y="264" fill="#ffc1e2" font-family="JetBrains Mono, Consolas, monospace" font-size="16">stack: Python | OpenCV | CustomTkinter | Windows</text>
  <rect class="blink" x="734" y="244" width="14" height="22" fill="#ff69b4"/>

  <rect class="scan" x="500" y="66" width="95" height="236" fill="#ffffff" opacity="0.06"/>
  <path d="M206 302H794" stroke="#65dbff" stroke-opacity="0.38"/>
</svg>
